name: Node.js CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start
        run: docker compose up -d

      # Database အသင့်ဖြစ်သည်အထိ စောင့်ရန်
      - name: Wait for database
        run: sleep 15

      # Knex Migration ကို Run ခြင်း
      - name: Run migrations
        run: docker compose exec -T app npx knex migrate:latest --env test

      - name: Run tests
        run: docker compose exec -T app npm test
