version: "3.8"
services:
  db:
    image: postgres:15-alpine
    container_name: goat_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: goat_db
    ports:
      - "5432:5432"

  app: # ဒီနေရာမှာ သင့် App အတွက် ထည့်ပေးရပါမယ်
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://user:password@db:5432/goat_db
